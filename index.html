<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог товаров</title>
<style>
  body { font-family: Arial, sans-serif; background: #faf7f8; padding: 30px; }
  h1 { text-align: center; }
  ul { list-style: none; padding-left: 20px; }
  li { margin: 6px 0; }
  .item {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    color: #fff;
    font-weight: bold;
    user-select: none;
  }
  .level-1 { background: #ff8fb1; }
  .level-2 { background: #c89be0; }
  .leaf { background: #a8e6a3; color: #245c20; cursor: pointer; }
  .children { display: none; }
  .open > .children { display: block; }
  .toggle { display: inline-block; width: 18px; text-align: center; }
</style>
</head>
<body>

<h1>Каталог товаров</h1>
<ul id="catalog"></ul>

<script>
const data = [
  { name: "Книги", children: [
    { name: "Отечественные", children: [
      { name: "Детективы", link: "#" },
      { name: "Научная фантастика", link: "#" },
      { name: "Исторические", link: "#" }
    ]},
    { name: "Зарубежные", children: [
      { name: "Детективы", link: "#" },
      { name: "Научная фантастика", link: "#" },
      { name: "Исторические", link: "#" }
    ]}
  ]},
  { name: "DVD", children: [
    { name: "Отечественные", children: [
      { name: "Детективы", link: "#" },
      { name: "Научная фантастика", link: "#" },
      { name: "Исторические", link: "#" }
    ]},
    { name: "Зарубежные", children: [
      { name: "Детективы", link: "#" },
      { name: "Научная фантастика", link: "#" },
      { name: "Исторические", link: "#" }
    ]}
  ]}
];

function buildMenu(items, level) {
  const ul = document.createElement("ul");
  items.forEach(item => {
    const li = document.createElement("li");
    const span = document.createElement("span");

    if (item.children) {
      span.className = "item level-" + Math.min(level, 2);
      const toggle = document.createElement("span");
      toggle.className = "toggle";
      toggle.textContent = "+";
      span.appendChild(toggle);
      span.appendChild(document.createTextNode(" " + item.name));

      const childUl = buildMenu(item.children, level + 1);
      childUl.className = "children";

      span.addEventListener("click", () => {
        li.classList.toggle("open");
        toggle.textContent = li.classList.contains("open") ? "−" : "+";
      });

      li.appendChild(span);
      li.appendChild(childUl);
    } else {
      span.className = "item leaf";
      span.textContent = item.name;
      span.addEventListener("click", () => {
        alert("Это ссылка: можно перейти по «" + item.name + "»");
      });
      li.appendChild(span);
    }

    ul.appendChild(li);
  });
  return ul;
}

const catalog = document.getElementById("catalog");
catalog.appendChild(buildMenu(data, 1));
</script>

</body>
</html>
